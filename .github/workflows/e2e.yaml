name: e2e-cypress
on: 
    workflow_call:
      secrets:
        CYPRESS_RECORD_KEY:
          required: true
          description: 'Cypress record key for recording test results'

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          repository: M-N-Karthik/GIthub_action_cyprus_E2E
          ref: main
          token: ${{ secrets.CYPRESS_RECORD_KEY || secrets.GITHUB_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci
      - name: Run Cypress tests
        run: npm run test:e2e